<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <meta name="theme-color" content="#667eea" />
    <title>Team Chat - Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .auth-container {
        width: 100%;
        max-width: 400px;
        padding: 20px;
      }
      .auth-card {
        background: white;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      }
      .auth-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .auth-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 8px;
      }
      .auth-header p {
        font-size: 14px;
        color: #666;
      }
      .auth-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        border-bottom: 2px solid #eef2ff;
      }
      .auth-tab {
        flex: 1;
        padding: 12px;
        background: none;
        border: none;
        font-size: 16px;
        font-weight: 600;
        color: #666;
        cursor: pointer;
      }
      .auth-tab.active {
        color: #667eea;
        border-bottom: 2px solid #667eea;
        margin-bottom: -2px;
      }
      .auth-form {
        display: none;
      }
      .auth-form.active {
        display: block;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
      }
      .form-group input {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid #e2e8f0;
        border-radius: 14px;
        font-size: 14px;
        font-family: inherit;
      }
      .form-group input:focus {
        outline: none;
        border-color: #667eea;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary {
        background: #667eea;
        color: white;
      }
      .btn-primary:hover {
        background: #5a67d8;
      }
      .btn-link {
        background: none;
        margin-top: 12px;
        color: #667eea;
      }
      .auth-error {
        margin-top: 16px;
        padding: 12px;
        background: #fee2e2;
        color: #dc2626;
        border-radius: 12px;
        font-size: 13px;
        text-align: center;
      }
      .auth-success {
        margin-top: 16px;
        padding: 12px;
        background: #d1fae5;
        color: #065f46;
        border-radius: 12px;
        font-size: 13px;
        text-align: center;
      }
      .auth-note {
        font-size: 11px;
        color: #888;
        text-align: center;
        margin-top: 12px;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal-content {
        background: white;
        border-radius: 24px;
        width: 350px;
        max-width: 90%;
        padding: 24px;
      }
      .modal-header {
        margin-bottom: 16px;
      }
      .modal-header h3 {
        font-size: 18px;
      }
      .close-modal {
        float: right;
        font-size: 24px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>💬 Team Chat</h1>
          <p>Internal communication for your team</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Login</button>
          <button class="auth-tab" data-tab="register">Register</button>
        </div>

        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="your@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">Login →</button>
          <button type="button" id="forgotPasswordBtn" class="btn btn-link">
            Forgot Password?
          </button>
        </form>

        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label>Full Name</label>
            <input
              type="text"
              id="registerName"
              placeholder="Your name"
              required
            />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="registerEmail"
              placeholder="your@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="registerPassword"
              placeholder="•••••••• (min 6 characters)"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">
            Create Account →
          </button>
          <p class="auth-note">
            📧 Verification email will be sent. Please verify before logging in.
          </p>
        </form>

        <div id="authError" class="auth-error" style="display: none"></div>
        <div id="authSuccess" class="auth-success" style="display: none"></div>
      </div>
    </div>

    <div id="resetModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <span class="close-modal resetClose">&times;</span>
          <h3>Reset Password</h3>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="resetEmail" placeholder="your@email.com" />
        </div>
        <button id="sendResetBtn" class="btn btn-primary">
          Send Reset Link
        </button>
      </div>
    </div>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdbut_FdscAjl-OVSlAUhb7TOTiRNkh34",
        authDomain: "my-team-chat-2255.firebaseapp.com",
        projectId: "my-team-chat-2255",
        storageBucket: "my-team-chat-2255.firebasestorage.app",
        messagingSenderId: "805016891521",
        appId: "1:805016891521:web:ac9bc7a252bcf33686dd80",
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      document.querySelectorAll(".auth-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".auth-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          document
            .querySelectorAll(".auth-form")
            .forEach((form) => form.classList.remove("active"));
          document
            .getElementById(`${tab.dataset.tab}Form`)
            .classList.add("active");
        });
      });

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("loginEmail").value;
          const password = document.getElementById("loginPassword").value;
          const errorDiv = document.getElementById("authError");
          errorDiv.style.display = "none";
          try {
            const userCred = await auth.signInWithEmailAndPassword(
              email,
              password,
            );
            if (!userCred.user.emailVerified) {
              await auth.signOut();
              errorDiv.textContent =
                "Please verify your email first! Check your inbox.";
              errorDiv.style.display = "block";
              return;
            }
            const userDoc = await db
              .collection("users")
              .doc(userCred.user.uid)
              .get();
            if (userDoc.exists && userDoc.data().isActive === false) {
              await db
                .collection("users")
                .doc(userCred.user.uid)
                .update({ isActive: true, deactivatedAt: null });
            }
            await db.collection("users").doc(userCred.user.uid).set(
              {
                onlineStatus: "online",
                lastSeen: new Date(),
              },
              { merge: true },
            );
            window.location.href = "index.html";
          } catch (error) {
            errorDiv.textContent = error.message;
            errorDiv.style.display = "block";
          }
        });

      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = document.getElementById("registerName").value;
          const email = document.getElementById("registerEmail").value;
          const password = document.getElementById("registerPassword").value;
          const errorDiv = document.getElementById("authError");
          const successDiv = document.getElementById("authSuccess");
          errorDiv.style.display = "none";
          successDiv.style.display = "none";
          try {
            const userCred = await auth.createUserWithEmailAndPassword(
              email,
              password,
            );
            await userCred.user.updateProfile({ displayName: name });
            await db
              .collection("users")
              .doc(userCred.user.uid)
              .set({
                uid: userCred.user.uid,
                email: email,
                displayName: name,
                createdAt: new Date(),
                isActive: true,
                isFirstTime: true,
                onlineStatus: "offline",
                privacySettings: {
                  hideReadReceipts: false,
                  hideTypingIndicator: false,
                  hideLastSeen: false,
                },
              });
            await userCred.user.sendEmailVerification();
            successDiv.textContent =
              "Account created! Please verify your email before logging in.";
            successDiv.style.display = "block";
            document.getElementById("registerForm").reset();
          } catch (error) {
            errorDiv.textContent = error.message;
            errorDiv.style.display = "block";
          }
        });

      const resetModal = document.getElementById("resetModal");
      document
        .getElementById("forgotPasswordBtn")
        .addEventListener("click", () => {
          resetModal.style.display = "flex";
        });
      document.querySelectorAll(".resetClose").forEach((btn) => {
        btn.addEventListener(
          "click",
          () => (resetModal.style.display = "none"),
        );
      });
      document
        .getElementById("sendResetBtn")
        .addEventListener("click", async () => {
          const email = document.getElementById("resetEmail").value;
          try {
            await auth.sendPasswordResetEmail(email);
            alert("Password reset email sent!");
            resetModal.style.display = "none";
          } catch (error) {
            alert(error.message);
          }
        });
    </script>
  </body>
</html>
