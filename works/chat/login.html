<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Team Chat - Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>💬 Team Chat</h1>
          <p>Internal communication for Wazeefa1 team</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Login</button>
          <button class="auth-tab" data-tab="register">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="your@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">Login →</button>
          <button type="button" id="forgotPasswordBtn" class="btn btn-link">
            Forgot Password?
          </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label>Full Name</label>
            <input
              type="text"
              id="registerName"
              placeholder="Your name"
              required
            />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="registerEmail"
              placeholder="your@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="registerPassword"
              placeholder="•••••••• (min 6 characters)"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">
            Create Account →
          </button>
          <p class="auth-note">
            📧 Verification email will be sent. Please verify before logging in.
          </p>
        </form>

        <div id="authError" class="auth-error" style="display: none"></div>
        <div id="authSuccess" class="auth-success" style="display: none"></div>
      </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetModal" class="modal" style="display: none">
      <div class="modal-content" style="max-width: 350px">
        <div class="modal-header">
          <h3>Reset Password</h3>
          <span class="close-modal reset-close">&times;</span>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="resetEmail" placeholder="your@email.com" />
          </div>
          <button id="sendResetBtn" class="btn btn-primary">
            Send Reset Link
          </button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
