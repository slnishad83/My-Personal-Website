<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refreshing Chat App</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #111b21;
      color: #e9edef;
    }

    main {
      text-align: center;
      padding: 24px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      margin: 0 auto 18px;
      border: 3px solid rgba(233, 237, 239, 0.25);
      border-top-color: #00a884;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main>
    <div class="spinner" aria-hidden="true"></div>
    <h1>Refreshing latest app files</h1>
    <p>Please wait. Your login stays saved if the browser still has it.</p>
  </main>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }

        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(cacheName => caches.delete(cacheName)));
        }
      } finally {
        window.location.replace(`index.html?fresh=${Date.now()}`);
      }
    })();
  </script>
</body>
</html>
