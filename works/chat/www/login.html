<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Team Chat — Sign In</title>
    <script>
      (() => {
        const saved = localStorage.getItem("darkMode");
        const dark = saved === "true" || (saved === null && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      })();
    </script>
    <link rel="manifest" href="manifest.json?v=96" />
    <link rel="apple-touch-icon" href="app-icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f0f4ff;
        --surface: #ffffff;
        --surface2: #f5f7ff;
        --border: #dde3ff;
        --text: #111827;
        --muted: #6b7280;
        --brand: #6366f1;
        --brand-dark: #4f46e5;
        --brand-light: #eef2ff;
        --error: #ef4444;
        --success: #10b981;
        --shadow: 0 24px 64px rgba(99,102,241,0.14);
        --radius: 14px;
        --t: 0.2s cubic-bezier(0.4,0,0.2,1);
      }
      [data-theme="dark"] {
        --bg: #0d0d1f;
        --surface: #18183a;
        --surface2: #111130;
        --border: #2a2a5a;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --brand: #818cf8;
        --brand-dark: #6366f1;
        --brand-light: #1e1b4b;
        --shadow: 0 24px 64px rgba(0,0,0,0.5);
      }
      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
      body {
        font-family:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
        background:var(--bg); min-height:100vh;
        display:flex; align-items:center; justify-content:center;
        padding:max(20px,env(safe-area-inset-top,20px)) 20px max(20px,env(safe-area-inset-bottom,20px));
        color:var(--text); position:relative; overflow:hidden;
      }
      body::before {
        content:''; position:fixed; inset:0;
        background:
          radial-gradient(ellipse 80% 70% at 15% 5%,rgba(99,102,241,.18) 0%,transparent 55%),
          radial-gradient(ellipse 60% 55% at 85% 95%,rgba(139,92,246,.12) 0%,transparent 55%);
        pointer-events:none; z-index:0;
      }
      .auth-wrap{position:relative;z-index:1;width:100%;max-width:420px;}

      .brand-header{text-align:center;margin-bottom:1.5rem;}
      .brand-logo {
        display:inline-flex;align-items:center;justify-content:center;
        width:60px;height:60px;border-radius:20px;margin-bottom:.875rem;
        background:linear-gradient(135deg,#6366f1,#8b5cf6);
        box-shadow:0 8px 28px rgba(99,102,241,.4);
      }
      .brand-logo svg{width:30px;height:30px;fill:white;}
      .brand-name{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;}
      .brand-tagline{font-size:.84rem;color:var(--muted);margin-top:.25rem;}

      .auth-card {
        background:var(--surface);border-radius:24px;
        padding:2rem;box-shadow:var(--shadow);border:1px solid var(--border);
      }
      .auth-tabs {
        display:flex;background:var(--surface2);border-radius:12px;
        padding:4px;margin-bottom:1.75rem;border:1px solid var(--border);
      }
      .auth-tab {
        flex:1;padding:.6rem;background:none;border:none;
        font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;
        border-radius:9px;transition:all var(--t);font-family:inherit;
      }
      .auth-tab.active {
        background:var(--surface);color:var(--brand);
        box-shadow:0 2px 10px rgba(0,0,0,.1);
      }
      .auth-form{display:none;}
      .auth-form.active{display:block;}

      .form-group{margin-bottom:1rem;}
      .form-group label {
        display:block;font-size:.78rem;font-weight:700;color:var(--muted);
        margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em;
      }
      .input-wrap{position:relative;}
      .input-icon {
        position:absolute;left:13px;top:50%;transform:translateY(-50%);
        font-size:1rem;pointer-events:none;opacity:.55;
      }
      .input-wrap input {
        width:100%;padding:.875rem 1rem .875rem 2.75rem;
        background:var(--surface2);border:1.5px solid var(--border);
        border-radius:var(--radius);font-size:.95rem;font-family:inherit;
        color:var(--text);transition:border-color var(--t),box-shadow var(--t);
      }
      .input-wrap input:focus {
        outline:none;border-color:var(--brand);
        box-shadow:0 0 0 3px rgba(99,102,241,.16);
      }
      .input-wrap input::placeholder{color:var(--muted);opacity:.6;}

      .password-wrap input{padding-right:3rem;}
      .password-toggle {
        position:absolute;right:10px;top:50%;transform:translateY(-50%);
        width:34px;height:34px;border:0;background:transparent;
        color:var(--muted);cursor:pointer;border-radius:8px;font-size:15px;
        display:flex;align-items:center;justify-content:center;transition:all var(--t);
      }
      .password-toggle:hover{background:var(--brand-light);color:var(--brand);}

      .field-error {
        color:var(--error);font-size:.78rem;margin-top:.35rem;
        display:none;align-items:center;gap:.3rem;
      }
      .field-error.show{display:flex;}

      .btn {
        width:100%;padding:.9rem;border:none;border-radius:var(--radius);
        font-size:.95rem;font-weight:700;cursor:pointer;
        transition:all var(--t);font-family:inherit;
      }
      .btn-primary {
        background:linear-gradient(135deg,var(--brand) 0%,#8b5cf6 100%);
        color:white;box-shadow:0 4px 16px rgba(99,102,241,.38);
      }
      .btn-primary:hover:not(:disabled){
        transform:translateY(-1px);box-shadow:0 6px 22px rgba(99,102,241,.48);
      }
      .btn-primary:active{transform:translateY(0);}
      .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
      .btn-ghost{
        background:none;color:var(--brand);font-weight:600;
        font-size:.88rem;padding:.6rem;margin-top:.5rem;
      }
      .btn-ghost:hover{background:var(--brand-light);}
      .btn-secondary{
        background:var(--brand-light);color:var(--brand);
        margin-top:.5rem;font-size:.88rem;
      }
      .btn-outline-install{
        background:var(--surface2);border:1.5px solid var(--border);
        color:var(--text);margin-top:1rem;font-weight:600;
        display:none;align-items:center;justify-content:center;gap:8px;
      }
      .btn-outline-install:hover{border-color:var(--brand);color:var(--brand);}

      .alert {
        border-radius:var(--radius);font-size:.88rem;
        padding:.875rem 1rem;margin-top:1rem;
        display:none;align-items:flex-start;gap:.5rem;line-height:1.5;
      }
      .alert.show{display:flex;}
      .alert-error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
      .alert-success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
      [data-theme="dark"] .alert-error{background:#450a0a;color:#fca5a5;border-color:#7f1d1d;}
      [data-theme="dark"] .alert-success{background:#052e16;color:#86efac;border-color:#14532d;}

      .auth-note{font-size:.78rem;color:var(--muted);text-align:center;margin-top:.75rem;line-height:1.5;}
      .install-note{display:none;font-size:.75rem;color:var(--muted);text-align:center;margin-top:.5rem;}

      .modal {
        display:none;position:fixed;inset:0;
        background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
        align-items:center;justify-content:center;z-index:1000;padding:20px;
      }
      .modal.open{display:flex;}
      .modal-card {
        background:var(--surface);border-radius:22px;
        width:min(380px,100%);padding:1.75rem;
        border:1px solid var(--border);box-shadow:var(--shadow);
      }
      .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
      .modal-head h3{font-size:1.1rem;font-weight:700;}
      .modal-close{background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--muted);line-height:1;}
      .modal-close:hover{color:var(--text);}

      .theme-btn {
        position:fixed;top:20px;right:20px;
        width:40px;height:40px;border-radius:50%;
        background:var(--surface);border:1.5px solid var(--border);
        cursor:pointer;font-size:1.1rem;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 2px 12px rgba(0,0,0,.12);
        transition:all var(--t);z-index:100;
      }
      .theme-btn:hover{transform:rotate(20deg) scale(1.1);border-color:var(--brand);}

      @media(max-width:480px){
        body{align-items:stretch;background:var(--surface);}
        body::before{display:none;}
        .auth-wrap{max-width:none;}
        .auth-card{border-radius:0;box-shadow:none;border:none;min-height:100dvh;padding:1.5rem 1.25rem;}
        .brand-header{padding-top:1rem;}
        .theme-btn{top:12px;right:12px;}
      }
    </style>
  </head>
  <body>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme" id="themeBtn">🌙</button>

    <div class="auth-wrap">
      <div class="brand-header">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
        </div>
        <div class="brand-name">Team Chat</div>
        <div class="brand-tagline">Collaborate seamlessly with your team</div>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="register">Create Account</button>
        </div>

        <form id="loginForm" class="auth-form active" novalidate>
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">✉️</span>
              <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required />
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap password-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="password-toggle" data-password-toggle="loginPassword" aria-label="Show password">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">Sign In →</button>
          <button type="button" id="forgotPasswordBtn" class="btn btn-ghost">Forgot password?</button>
          <button type="button" id="resendVerificationBtn" class="btn btn-secondary" style="display:none;">Resend verification email</button>
        </form>

        <form id="registerForm" class="auth-form" novalidate>
          <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="registerName" placeholder="Your display name" autocomplete="name" required />
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">✉️</span>
              <input type="email" id="registerEmail" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <div id="emailError" class="field-error"></div>
          </div>
          <div class="form-group">
            <label>Phone (optional)</label>
            <div class="input-wrap">
              <span class="input-icon">📱</span>
              <input type="tel" id="registerPhone" placeholder="10-digit Indian number" autocomplete="tel" />
            </div>
            <div id="phoneError" class="field-error"></div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap password-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="registerPassword" placeholder="Min. 6 characters" autocomplete="new-password" required />
              <button type="button" class="password-toggle" data-password-toggle="registerPassword" aria-label="Show password">👁️</button>
            </div>
            <div id="passwordError" class="field-error"></div>
          </div>
          <button type="submit" class="btn btn-primary" id="registerBtn">Create Account →</button>
          <p class="auth-note">📧 A verification email will be sent. Please verify before signing in.</p>
        </form>

        <div id="authError" class="alert alert-error"></div>
        <div id="authSuccess" class="alert alert-success"></div>
        <button id="installAppBtn" class="btn btn-outline-install" type="button" data-install-app style="display:none;">⬇️ Install App</button>
        <p id="installHelpText" class="install-note" data-install-help></p>
      </div>
    </div>

    <div id="resetModal" class="modal">
      <div class="modal-card">
        <div class="modal-head">
          <h3>Reset Password</h3>
          <button class="modal-close resetClose" aria-label="Close">×</button>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="resetEmail" placeholder="you@example.com" />
          </div>
        </div>
        <button id="sendResetBtn" class="btn btn-primary">Send Reset Link</button>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdbut_FdscAjl-OVSlAUhb7TOTiRNkh34",
        authDomain: "my-team-chat-2255.firebaseapp.com",
        projectId: "my-team-chat-2255",
        storageBucket: "my-team-chat-2255.firebasestorage.app",
        messagingSenderId: "805016891521",
        appId: "1:805016891521:web:ac9bc7a252bcf33686dd80",
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
      let lastUnverifiedEmail = "", lastUnverifiedPassword = "";

      function isLikelyPrivateSession() {
        try { const k="tcProbe"; localStorage.setItem(k,k); localStorage.removeItem(k); return false; }
        catch { return true; }
      }
      const authPersistenceReady = auth.setPersistence(
        isLikelyPrivateSession() ? firebase.auth.Auth.Persistence.SESSION : firebase.auth.Auth.Persistence.LOCAL
      );

      const cleanEmail = e => e.trim().toLowerCase();
      const validateEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
      const validatePhone = p => /^[6-9]\d{9}$/.test(p);
      const validatePassword = p => p.length >= 6;

      function getFriendlyError(err) {
        const c = err?.code;
        if (["auth/invalid-credential","auth/wrong-password","auth/user-not-found"].includes(c))
          return "Incorrect email or password.";
        if (c === "auth/too-many-requests") return "Too many attempts. Please wait a few minutes.";
        if (c === "auth/network-request-failed") return "Network problem. Check your connection.";
        if (c === "auth/invalid-email") return "Please enter a valid email address.";
        if (c === "auth/email-already-in-use") return "Email already registered. Try signing in.";
        if (c === "auth/weak-password") return "Password too weak. Use at least 6 characters.";
        return err?.message || "Something went wrong. Please try again.";
      }

      const $id = id => document.getElementById(id);
      const showError = msg => { $id("authError").textContent = "⚠️ "+msg; $id("authError").classList.add("show"); $id("authSuccess").classList.remove("show"); };
      const showSuccess = msg => { $id("authSuccess").textContent = "✅ "+msg; $id("authSuccess").classList.add("show"); $id("authError").classList.remove("show"); };
      const clearAlerts = () => { $id("authError").classList.remove("show"); $id("authSuccess").classList.remove("show"); };
      function showFieldError(id, msg) { const el=$id(id); if(el){el.textContent=msg;el.classList.add("show");} }
      function clearFieldErrors() { ["emailError","phoneError","passwordError"].forEach(id=>{const el=$id(id);if(el)el.classList.remove("show");}); }
      function setLoading(btn,loading,label,loadLabel) { btn.disabled=loading; btn.textContent=loading?loadLabel:label; }
      function getVerifSettings() { return {url:new URL("verify.html",window.location.href).href,handleCodeInApp:false}; }

      // Tabs
      document.querySelectorAll(".auth-tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".auth-tab,.auth-form").forEach(el=>el.classList.remove("active"));
          tab.classList.add("active");
          $id(tab.dataset.tab+"Form").classList.add("active");
          clearAlerts(); clearFieldErrors();
        });
      });

      // Password toggles
      document.querySelectorAll("[data-password-toggle]").forEach(btn => {
        btn.addEventListener("click", () => {
          const inp = $id(btn.dataset.passwordToggle);
          inp.type = inp.type === "password" ? "text" : "password";
          btn.textContent = inp.type === "password" ? "👁️" : "🙈";
        });
      });

      // Theme toggle
      function toggleTheme() {
        const isDark = document.documentElement.dataset.theme === "dark";
        document.documentElement.dataset.theme = isDark ? "light" : "dark";
        localStorage.setItem("darkMode", String(!isDark));
        $id("themeBtn").textContent = isDark ? "🌙" : "☀️";
      }
      $id("themeBtn").textContent = document.documentElement.dataset.theme === "dark" ? "☀️" : "🌙";

      // Login
      $id("loginForm").addEventListener("submit", async e => {
        e.preventDefault(); clearAlerts();
        const email = cleanEmail($id("loginEmail").value);
        const password = $id("loginPassword").value;
        const btn = $id("loginBtn");
        setLoading(btn, true, "Sign In →", "Signing in…");
        try {
          await authPersistenceReady;
          const cred = await auth.signInWithEmailAndPassword(email, password);
          if (!cred.user.emailVerified) {
            lastUnverifiedEmail = email; lastUnverifiedPassword = password;
            await auth.signOut();
            showError("Please verify your email before signing in.");
            $id("resendVerificationBtn").style.display = "block";
            return;
          }
          window.location.href = "index.html";
        } catch(err) {
          showError(getFriendlyError(err));
        } finally {
          setLoading(btn, false, "Sign In →", "Signing in…");
        }
      });

      // Resend verification
      $id("resendVerificationBtn").addEventListener("click", async () => {
        const btn = $id("resendVerificationBtn");
        if (!lastUnverifiedEmail) { showError("Sign in first, then resend."); return; }
        setLoading(btn, true, "Resend verification email", "Sending…");
        try {
          await authPersistenceReady;
          const cred = await auth.signInWithEmailAndPassword(lastUnverifiedEmail, lastUnverifiedPassword);
          await cred.user.sendEmailVerification(getVerifSettings());
          await auth.signOut();
          showSuccess("Verification email sent. Check your inbox.");
        } catch(err) {
          showError(getFriendlyError(err));
        } finally {
          setLoading(btn, false, "Resend verification email", "Sending…");
        }
      });

      // Register
      $id("registerForm").addEventListener("submit", async e => {
        e.preventDefault(); clearAlerts(); clearFieldErrors();
        const name = $id("registerName").value.trim();
        const email = cleanEmail($id("registerEmail").value);
        const phone = $id("registerPhone").value.trim();
        const password = $id("registerPassword").value;
        const btn = $id("registerBtn");
        let hasError = false;
        if (!name || name.length < 2) { showError("Please enter your full display name."); hasError = true; }
        if (!validateEmail(email)) { showFieldError("emailError","❌ Enter a valid email (e.g. name@domain.com)."); hasError = true; }
        if (phone && !validatePhone(phone)) { showFieldError("phoneError","❌ Valid 10-digit Indian number (starts with 6–9)."); hasError = true; }
        if (!validatePassword(password)) { showFieldError("passwordError","❌ Password must be at least 6 characters."); hasError = true; }
        if (hasError) return;
        setLoading(btn, true, "Create Account →", "Creating account…");
        let createdUser = null;
        try {
          await authPersistenceReady;
          const cred = await auth.createUserWithEmailAndPassword(email, password);
          createdUser = cred.user;
          await cred.user.updateProfile({ displayName: name });
          await cred.user.sendEmailVerification(getVerifSettings());
          await db.collection("users").doc(cred.user.uid).set({
            uid: cred.user.uid, email, displayName: name, phone,
            createdAt: new Date(), isActive: true, isFirstTime: true,
            emailVerified: false, pendingVerification: true, onlineStatus: "offline",
            privacySettings: { hideReadReceipts:false, hideTypingIndicator:false, hideLastSeen:false },
          });
          await auth.signOut();
          showSuccess("Account created! Check your inbox (and Spam) for the verification email.");
          e.target.reset();
        } catch(err) {
          if (createdUser) { await createdUser.delete().catch(()=>{}); await auth.signOut().catch(()=>{}); }
          showError(getFriendlyError(err));
        } finally {
          setLoading(btn, false, "Create Account →", "Creating account…");
        }
      });

      // Reset password
      $id("forgotPasswordBtn").addEventListener("click", () => $id("resetModal").classList.add("open"));
      document.querySelectorAll(".resetClose").forEach(btn => btn.addEventListener("click", () => $id("resetModal").classList.remove("open")));
      $id("resetModal").addEventListener("click", e => { if(e.target===$id("resetModal")) $id("resetModal").classList.remove("open"); });
      $id("sendResetBtn").addEventListener("click", async () => {
        const email = $id("resetEmail").value.trim();
        const btn = $id("sendResetBtn");
        if (!email) { alert("Please enter your email."); return; }
        setLoading(btn, true, "Send Reset Link", "Sending…");
        try {
          await auth.sendPasswordResetEmail(email);
          $id("resetModal").classList.remove("open");
          showSuccess("Password reset email sent! Check your inbox.");
        } catch(err) {
          alert("❌ " + (err.message || "Failed to send reset email."));
        } finally {
          setLoading(btn, false, "Send Reset Link", "Sending…");
        }
      });
    </script>
    <script src="pwa-install.js?v=142"></script>
  </body>
</html>
